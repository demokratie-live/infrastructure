apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
spec:
  selector:
    matchLabels:
      app: mongo
  serviceName: "mongo"
  replicas: 3
  ordinals:
    start: 3
  updateStrategy:
    type: OnDelete
  template:
    metadata:
      labels:
        app: mongo
        mongo-rs-role: active
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mongo
                  mongo-rs-role: active
              topologyKey: kubernetes.io/hostname
      containers:
        - name: mongo
          command:
            - mongod
            - "--bind_ip_all"
            - "--replSet"
            - rs0
          resources:
            requests:
              memory: "3G"
              cpu: "300m"
            limits:
              memory: "5G"
              cpu: "2000m"
  volumeClaimTemplates:
    - metadata:
        name: mongo-volume
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
